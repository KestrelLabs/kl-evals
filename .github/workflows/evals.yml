name: evals

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Path to eval suite YAML"
        required: true
        default: "examples/structured_extraction.yaml"
      model:
        description: "Model name"
        required: true
        default: "gpt-4.1-mini"

jobs:
  run-evals:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[openai]"

      - name: Verify OPENAI_API_KEY secret is set
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY is not set. Add it in GitHub: Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi

      - name: Run suite
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          kestrel-evals run "${{ inputs.suite }}" --model "${{ inputs.model }}" --out reports/report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/report.json
